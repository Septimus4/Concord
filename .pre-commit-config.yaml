repos:
  # Use ruff for fast, compatible formatting and linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.1
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # Run tests with coverage; call dotenv module correctly
  - repo: local
    hooks:
      - id: pytest
        name: pytest with coverage
        entry: poetry run pytest
        language: system
        pass_filenames: false
        args: ["--cov=src", "--cov-report=xml"]